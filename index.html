<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de CSV em Mapa (Com Gráfico)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     
     crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Plote Seus Dados CSV em um Mapa (Com Gráfico de Dados)</h1>

    <div class="controls">
        <label for="csvFile">Selecione o arquivo CSV:</label>
        <input type="file" id="csvFile" accept=".csv">
        <div id="columnSelector" style="display:none;">
            <label for="dataColumn">Selecione o dado para plotar:</label>
            <select id="dataColumn"></select>
        </div>
        <div id="colorLegend" style="display:none;">
            <h4>Legenda da Cor da Linha/Pontos</h4>
            <div id="gradientBar"></div>
            <span id="minValLabel">Min: </span>
            <span id="maxValLabel" style="float:right;">Max: </span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
