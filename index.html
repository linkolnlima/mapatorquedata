<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de CSV em Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"  
     crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Plote Seus Dados CSV em um Mapa</h1>

    <div class="controls">
        <label for="csvFile">Selecione o arquivo CSV:</label>
        <input type="file" id="csvFile" accept=".csv">
        <div id="columnSelector" style="display:none;">
            <label for="dataColumn">Selecione o dado para plotar:</label>
            <select id="dataColumn"></select>
        </div>
    </div>

    <div id="map"></div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
